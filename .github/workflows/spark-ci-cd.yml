name: spark-ci-cd

on:
  pull_request:
    branches:
      - main
    paths:
      - include/**

permissions:
  contents: write

jobs:
  build-deploy-and-update-values:
    runs-on: ubuntu-latest
    env:
      REGISTRY: 10.43.7.183:5000
      IMAGE_REPOSITORY: gitsight/spark
      VALUES_FILE: k8s/airflow/values.yaml
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set image tag and branch variables
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SPARK_IMAGE=${REGISTRY}/${IMAGE_REPOSITORY}:${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "PR_BRANCH=${{ github.head_ref }}" >> "$GITHUB_ENV"

      - name: Build and push spark image via internal SSH (Kaniko job)
        uses: appleboy/ssh-action@v1.0.3
        env:
          SPARK_IMAGE: ${{ env.SPARK_IMAGE }}
          PR_BRANCH: ${{ env.PR_BRANCH }}
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ${{ secrets.TARGET_USER }}
          key: ${{ secrets.OCI_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.OCI_KEY }}
          envs: SPARK_IMAGE, PR_BRANCH
          script: |
            set -euo pipefail
            cd ~/gitsight-data-pipeline
            git fetch --prune origin
            
            git checkout "$PR_BRANCH"
            git reset --hard origin/"$PR_BRANCH"
            
            export KUBECONFIG="$HOME/.kube/config"

            sed -i "s|\(--destination=\)[^\" ]*|\1${SPARK_IMAGE}|" k8s/ci/spark-ci.yaml
            
            grep "destination" k8s/ci/spark-ci.yaml

            kubectl delete job gitsight-spark-ci-job -n zot --ignore-not-found
            kubectl apply -f k8s/ci/spark-ci.yaml
            kubectl wait --for=condition=complete --timeout=900s job/gitsight-spark-ci-job -n zot

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Update Airflow values.yaml
        id: update_values
        run: |
          yq eval -i '
            .airflow.env |= (. // []) |
            ((.airflow.env[] | select(.name == "AIRFLOW_VAR_SPARK_IMAGE")).value) = strenv(SPARK_IMAGE) |
            (select((.airflow.env[] | select(.name == "AIRFLOW_VAR_SPARK_IMAGE")) == null)) .airflow.env += [{"name": "AIRFLOW_VAR_SPARK_IMAGE", "value": strenv(SPARK_IMAGE)}]
          ' "${VALUES_FILE}"

          if git diff --quiet "${VALUES_FILE}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and Push to PR Branch
        if: steps.update_values.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${VALUES_FILE}"
          git commit -m "chore: deploy spark image ${SHORT_SHA} [skip ci]"
          
          git pull --rebase origin ${{ github.head_ref }}
          git push origin HEAD:${{ github.head_ref }}
