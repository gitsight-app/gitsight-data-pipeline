name: Deploy Airflow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Create SSH key file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ssh-keyscan -H ${{ secrets.OCI_PUBLIC_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Airflow on OCI Server
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.OCI_USER }}@${{ secrets.OCI_PUBLIC_SERVER_HOST }} \
          "cd /home/ubuntu/gitsight-data-pipeline && \
           git pull origin main && \
           cd scripts && \
           sudo sh run_airflow.sh"
