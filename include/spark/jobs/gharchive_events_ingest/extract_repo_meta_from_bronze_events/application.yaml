apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: "{{ task.task_id | replace('_', '-') }}-{{ ts_nodash | lower }}"
  namespace: spark-applications

spec:
  type: Python
  mode: cluster
  image: "{{ var.value.SPARK_IMAGE }}"
  imagePullPolicy: Always
  mainApplicationFile: "{{ var.value.spark_job_prefix }}/include/spark/jobs/gharchive_events_ingest/extract_repo_meta_from_bronze_events/job.py"
  sparkVersion: 3.5.1

  restartPolicy:
    type: Never

  sparkConf:
    spark.driver.extraJavaOptions: "-Duser.name=spark"
    spark.executor.extraJavaOptions: "-Duser.name=spark"
    "spark.hadoop.fs.s3a.access.key": "{{ conn.aws_default.login }}"
    "spark.hadoop.fs.s3a.secret.key": "{{ conn.aws_default.password }}"
    "spark.hadoop.fs.s3a.endpoint": "{{ conn.aws_default.extra_dejson.get('endpoint_url', 's3.ap-northeast-2.amazonaws.com') }}"
    "spark.hadoop.fs.s3a.connection.ssl.enabled": "false"

    "spark.sql.catalog.nessie": "org.apache.iceberg.spark.SparkCatalog"
    "spark.sql.catalog.nessie.catalog-impl": "org.apache.iceberg.nessie.NessieCatalog"
    {% set nessie_extra = conn.nessie_default.extra_dejson %}
    "spark.sql.catalog.nessie.uri": "{{ nessie_extra.get('uri', 'http://localhost:19120/api/v1') }}"
    "spark.sql.catalog.nessie.ref": "{{ nessie_extra.get('ref', 'main') }}"
    "spark.sql.catalog.nessie.warehouse": "{{ nessie_extra.get('warehouse') }}"

  arguments:
    - "--data_interval_start"
    - "{{ data_interval_start }}"
    - "--data_interval_end"
    - "{{ data_interval_end }}"

  driver:
    image: "{{ var.value.SPARK_IMAGE }}"
    cores: 0.1
    coreLimit: "500m"
    memory: "512m"
    serviceAccount: airflow-spark
    labels:
      version: "3.5.1"
    env:
      - name: HADOOP_USER_NAME
        value: spark
      - name: USER
        value: spark
      - name: LOGNAME
        value: spark
      - name: PYTHONPATH
        value: "/opt/bitnami/spark"

  executor:
    image: "{{ var.value.SPARK_IMAGE }}"
    cores: 0.2
    instances: 1
    memory: "1024m"
    serviceAccount: airflow-spark
    labels:
      version: "3.5.1"
    env:
      - name: HADOOP_USER_NAME
        value: spark
      - name: USER
        value: spark
      - name: LOGNAME
        value: spark
