plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.apache.hadoop:hadoop-aws:3.3.4'
    implementation 'org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.0'
    implementation 'org.postgresql:postgresql:42.7.3'
    implementation 'org.projectnessie.nessie-integrations:nessie-spark-extensions-3.5_2.12:0.77.1'
}

task copyDependencies(type: Copy) {
    from configurations.runtimeClasspath
    into "$buildDir/deps"
}
