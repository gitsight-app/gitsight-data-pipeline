apiVersion: batch/v1
kind: Job
metadata:
  name: gitsight-spark-ci-job
  namespace: zot
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 100
  template:
    spec:
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:latest
          args:
            - "--context=git://github.com//gitsight-app/gitsight-data-pipeline.git#refs/heads/dev"
            - "--dockerfile=docker/spark/Dockerfile"
            - "--destination=gitsight-zot.zot.svc.cluster.local:5000/gitsight/spark:latest"
            - "--insecure"
            - "--skip-tls-verify"
            - "--cache=true"
      restartPolicy: Never
  backoffLimit: 0
