# k8s RBAC (ns: airflow -> spark-applications)
# Related SA: (airflow-sa, airflow-scheduler, airflow-triggerer, airflow-worker)
# Created SA: airflow-spark (for Spark Driver by Airflow's SparkApplication)
# Role: airflow-spark-driver-role

# ----
# When Use SparkKubernetesOperator in Airflow,
# "serviceAccount": "airflow-spark"
# ----
apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow-spark
  namespace: spark-applications
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: spark-applications
  name: airflow-spark-driver-role
rules:
  - apiGroups: [ "" ]
    resources: [ "pods", "pods/log", "services", "configmaps", "persistentvolumeclaims", "secrets" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete", "deletecollection" ]
  - apiGroups: [ "apps" ]
    resources: [ "deployments", "statefulsets" ]
    verbs: [ "get", "list", "watch" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-spark-driver-binding
  namespace: spark-applications
subjects:
  - kind: ServiceAccount
    name: airflow-spark
    namespace: spark-applications
roleRef:
  kind: Role
  name: airflow-spark-driver-role
  apiGroup: rbac.authorization.k8s.io
