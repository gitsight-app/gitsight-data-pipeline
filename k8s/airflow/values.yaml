airflow:
  images:
    airflow:
      repository: 10.43.7.183:5000/gitsight/airflow
      tag: latest
      pullPolicy: Always
  fernetKeySecretName: "gitsight-airflow-fernet-key"
  migrateDatabaseJob:
    enabled: false
    useHelmHooks: false
  createUserJob:
    enabled: false
    useHelmHooks: false
  postgresql:
    enabled: false
  data:
    metadataSecretName: "airflow-db-connection"
  dags:
    persistence:
      enabled: false
    gitSync:
      enabled: true
      repo: "https://github.com/gitsight-app/gitsight-data-pipeline.git"
      branch: "main"
      rev: "HEAD"
      depth: 1
      wait: 60
      subPath: "dags"
  env:
    - name: AIRFLOW__CORE__LOAD_EXAMPLES
      value: "False"
    - name: AIRFLOW__KUBERNETES__NAMESPACE
      value: "airflow"
    - name: AIRFLOW_VAR_SPARK_IMAGE
      value: "10.43.7.183:5000/gitsight/spark:latest"
  executor: LocalExecutor
  apiServer:
    service:
      type: NodePort
      ports:
        - name: api-server
          port: 8080
          targetPort: 8080
          nodePort: 30090
  scheduler:
    extraVolumeMounts:
      - name: dags
        mountPath: /opt/airflow/plugins
        subPath: repo/plugins
      - name: dags
        mountPath: /opt/airflow/include
        subPath: repo/include
  dagProcessor:
    enabled: false
  triggerer:
    enabled: false
  logs:
    persistence:
      enabled: false
  statsd:
    enabled: false
  rbac:
    create: true
  serviceAccount:
    create: true
    name: "airflow-sa"
    annotations: {}
