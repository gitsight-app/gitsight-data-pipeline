airflow:
  images:
    airflow:
      pullPolicy: IfNotPresent

  env:
    - name: AIRFLOW__CORE__LOAD_EXAMPLES
      value: "False"
    - name: AIRFLOW__KUBERNETES__NAMESPACE
      value: "airflow"

  executor: LocalExecutor

  dags:
    persistence:
      enabled: false
    gitSync:
      enabled: true
      repo: "https://github.com/gitsight-app/gitsight-data-pipeline.git"
      branch: "main"
      subPath: "dags"
      depth: 1
      wait: 60
      uid: 65533

  logs:
    persistence:
      enabled: false

  statsd:
    enabled: false

  rbac:
    create: true

  serviceAccount:
    create: true
    name: "airflow-sa"
    annotations: { }


  triggerer:
    enabled: true
    extraVolumeMounts:
      - name: dags
        mountPath: /opt/airflow/plugins
        subPath: repo/plugins
      - name: dags
        mountPath: /opt/airflow/include
        subPath: repo/include

  postgresql:
    image:
      repository: bitnamilegacy/postgresql
      tag: "11"

  migrateDatabaseJob:
    enabled: true

  apiServer:
    extraVolumeMounts:
      - name: dags
        mountPath: /opt/airflow/plugins
        subPath: repo/plugins
      - name: dags
        mountPath: /opt/airflow/include
        subPath: repo/include

  scheduler:
    extraVolumeMounts:
      - name: dags
        mountPath: /opt/airflow/plugins
        subPath: repo/plugins
      - name: dags
        mountPath: /opt/airflow/include
        subPath: repo/include
