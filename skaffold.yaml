apiVersion: skaffold/v2beta29
kind: Config
metadata:
  name: airflow-spark-local

build:
  artifacts:
    - image: gitsight/airflow-local
      context: .
      docker:
        dockerfile: docker/airflow/Dockerfile
      sync:
        manual:
          - src: "dags/**/*"
            dest: "/opt/airflow/dags"
            strip: "dags/"
          - src: "plugins/**/*"
            dest: "/opt/airflow/plugins"
            strip: "plugins/"
          - src: "include/**/*"
            dest: "/opt/airflow/include"
            strip: "include/"

    - image: gitsight/spark-local
      context: .
      docker:
        dockerfile: docker/spark/Dockerfile

  local:
    push: false

deploy:
  helm:
    releases:
      - name: airflow
        chartPath: k8s/local/airflow
        namespace: airflow
        valuesFiles:
          - k8s/local/airflow/values.yaml
        setValueTemplates:
          airflow.images.airflow.repository: "{{.IMAGE_REPO_gitsight_airflow_local}}"
          airflow.images.airflow.tag: "{{.IMAGE_TAG_gitsight_airflow_local}}"
          airflow.images.airflow.pullPolicy: Never
          airflow.env[1].value: "airflow"
          airflow.env[2].name: AIRFLOW_VAR_SPARK_IMAGE
          airflow.env[2].value: "{{.IMAGE_REPO_gitsight_spark_local}}:{{.IMAGE_TAG_gitsight_spark_local}}"
          airflow.env[3].name: AIRFLOW_VAR_SPARK_JOB_PREFIX
          airflow.env[3].value: "local:///opt/bitnami/spark"
        wait: false

      - name: spark-operator
        remoteChart: spark-operator/spark-operator
        namespace: spark
        setValues:
          webhook.enable: "true"
          webhook.port: "443"
          spark.jobNamespaces: "{spark-applications}"

portForward:
  - resourceType: service
    resourceName: airflow-api-server
    namespace: airflow
    port: 8080
    localPort: 8080

profiles:
  - name: dev
    build:
      local:
        push: false
